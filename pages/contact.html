<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <title>お問い合わせ | モンゴル民族衣装</title>
    <link rel="stylesheet" href="../css/style.css">
</head>

<body>
    <div class="navbar">
        <h2>モンゴル民族衣装</h2>
        <a href="../home.html" class="menu-btn">
            <i class='bx bx-image'></i> ホーム
        </a>
        <!--<ul>
            <li><a href="home.html">ホーム</a></li>
            <li><a href="gallery.html">ギャラリー</a></li>
        </ul>-->
    </div>

    <section class="contact">
        <div class="contact-box">
            <h1>お問い合わせ</h1>
            <p class="intro">
                モンゴル民族衣装についてのご質問やご意見がありましたら、
                下記フォームよりお気軽にお問い合わせください。
            </p>

            <form id="contactForm">
                <label>名前</label>
                <input type="text" placeholder="お名前を入力してください">

                <label>メールアドレス</label>
                <input type="email" placeholder="メールアドレスを入力してください">

                <label>お問い合わせ内容</label>
                <textarea rows="6" placeholder="お問い合わせ内容を入力してください"></textarea>

                <button type="submit">
                    送信する
                </button>
            </form>

            <!--// Хэрэглэгч форм илгээсний дараа баярлалаа гэсэн мессеж харуулж, нүүр хуудас руу буцах товч ажиллуулна.-->
            <script>
                // Contact формыг олж авах
                const form = document.getElementById("contactForm");

                // Form илгээх үед ажиллах үйлдэл тохируулах
                form.addEventListener("submit", function (e) {

                    // Хуудсыг дахин ачаалах болон шилжих үйлдлийг зогсоох
                    e.preventDefault(); 

                    // Илгээсний дараа харагдах хэсгийг өөрчлөх
                    document.querySelector(".contact-box").innerHTML = `
                        <h1>ありがとうございます！</h1>
                        <p class="intro">
                            お問い合わせありがとうございました。<br>
                            またのご利用をお待ちしております。
                        </p>

                        <button id="homeBtn">ホームへ戻る</button>
                    `;

                    // Нүүр хуудас руу буцах товч дээр дарахад ажиллах үйлдэл
                    document.getElementById("homeBtn").addEventListener("click", function () {

                        // Home хуудас руу шилжих
                        location.href = "../home.html";
                    });
                });
            </script>
        </div>
    </section>
</body>
</html>
