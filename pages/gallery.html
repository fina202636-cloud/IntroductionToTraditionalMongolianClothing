<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <title>ギャラリー</title>
    <link rel="stylesheet" href="../css/style.css">
</head>

<body>

    <div class="navbar">
        <h2>モンゴル民族衣装</h2>

        <a href="../home.html" class="menu-btn">
            <i class='bx bx-image'></i> ホーム
        </a>

        <a href="../pages/contact.html">
            <button class="here-btn">お問い合わせ</button>
        </a>
    </div>

    <section class="hero">
        <h1>ギャラリー</h1><br><br>

        <div class="gallery">
            <figure>
                <img src="../imgs/buriad_deel.jpg" alt="デール1" class="gallery-img">
                <figcaption>ブリヤート族のデール。伝統的な装飾が特徴の衣装です。</figcaption>
            </figure>

            <figure>
                <img src="../imgs/buriad.jpg" alt="デール2" class="gallery-img">
                <figcaption>ブリヤート地方で着用されるデールの一例です。</figcaption>
            </figure>

            <figure>
                <img src="../imgs/darhad_deel.jpg" alt="デール3" class="gallery-img">
                <figcaption>ダルハド族のデール。地域独自の色や模様があります。</figcaption>
            </figure>

            <figure>
                <img src="../imgs/deel.jpg" alt="デール4" class="gallery-img">
                <figcaption>モンゴルの伝統衣装デールの基本的なスタイルです。</figcaption>
            </figure>

            <figure>
                <img src="../imgs/dorvod.jpg" alt="デール5" class="gallery-img">
                <figcaption>ドルボド族のデール。西部地域で見られる伝統衣装です。</figcaption>
            </figure>

            <figure>
                <img src="../imgs/halh_deel.jpg" alt="デール6" class="gallery-img">
                <figcaption>ハルハ族のデール。モンゴルで広く知られる代表的な型です。</figcaption>
            </figure>

            <figure>
                <img src="../imgs/zakhchin.jpg" alt="デール7" class="gallery-img">
                <figcaption>ザハチン族のデール。独特なデザインを持つ民族衣装です。</figcaption>
            </figure>
        </div>
    </section>

    // Зураг дээр дарахад зургийг хар дэвсгэр дээр томоор харуулж, дахин дарахад хаана.
    <script>
        // Бүх зургийг сонгож авах
        const images = document.querySelectorAll(".gallery-img");

        // Зураг бүр дээр дарах үйлдэл нэмэх
        images.forEach(image => {

            image.addEventListener("click", function () {

                // Томоор харуулах шинэ хэсэг үүсгэх
                const overlay = document.createElement("div");

                // Дарагдсан зургийг харуулах
                    overlay.innerHTML = `
                    <img src="${this.src}">
                `;

                // Арын хэсгийг дэлгэц дүүрэн болгох
                overlay.style.position = "fixed";
                overlay.style.top = "0";
                overlay.style.left = "0";
                overlay.style.width = "100%";
                overlay.style.height = "100%";
                overlay.style.background = "rgba(0,0,0,0.8)";

                // Зургийг голд байрлуулах
                overlay.style.display = "flex";
                overlay.style.justifyContent = "center";
                overlay.style.alignItems = "center";
                overlay.style.zIndex = "999";

                // Том зургийн хэмжээг тохируулах
                overlay.querySelector("img").style.maxWidth = "80%";
                overlay.querySelector("img").style.maxHeight = "80%";

                // Хуудсанд шинэ хэсгийг нэмэх
                document.body.appendChild(overlay);

                // Арын хэсэг дээр дарахад хаах
                overlay.addEventListener("click", function () {
                    overlay.remove();
                });

            });

        });
    </script>

    // Gallery-ийн зургуудыг дарааллаар нь аажмаар гаргаж харуулна.
    <script>
        // Gallery доторх бүх зурагны хэсгийг авах
        const figures = document.querySelectorAll(".gallery figure");

        // Зургуудыг дарааллаар нь гаргах
        figures.forEach((figure, index) => {

            // Эхлээд харагдахгүй болгох
            figure.style.opacity = "0";

            // Аажмаар харагдуулах эффект
            setTimeout(() => {
                figure.style.transition = "0.5s";
                figure.style.opacity = "1";
            }, index * 200);

        });
    </script>
</body>

</html>
